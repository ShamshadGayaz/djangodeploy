<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        body {
            background: #f5f7fb;
            color: #222;
        }
        .navbar {
            background: #0d6efd;
            color: white;
            padding: 18px 40px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
        }
        .container {
            width: 90%;
            max-width: 1200px;
            margin: 30px auto;
        }
        .hero {
            text-align: center;
            margin-bottom: 30px;
        }
        .hero h1 {
            font-size: 36px;
            margin-bottom: 10px;
            color: #0d6efd;
        }
        .hero p {
            font-size: 18px;
            color: #555;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }
        .card {
            background: white;
            border-radius: 14px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-6px);
        }
        .card img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            display: block;
        }
        .card-content {
            padding: 18px;
        }
        .card-content h2 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #0d6efd;
        }
        .card-content p {
            font-size: 16px;
            line-height: 1.6;
            color: #444;
        }
        .empty-state {
            background: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body>
    <div class="navbar">My Django Website</div>

    <div class="container">
        <div class="hero">
            <h1>Welcome to Home Page</h1>
           
        </div>

        {% if contents %}
            <div class="card-grid">
                {% for item in contents %}
                    <div class="card">
                        <img src="{{ item.image.url }}" alt="{{ item.title }}">
                        <div class="card-content">
                            <h2>{{ item.title }}</h2>
                            <p>{{ item.description }}</p>
                        </div>
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <div class="empty-state">
                <h2>No content added yet</h2>
               
            </div>
        {% endif %}
    </div>
</body>
</html>
